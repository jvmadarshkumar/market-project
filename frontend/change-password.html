<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password — Market Databank</title>
  <meta name="description" content="Securely change your Market Databank account password." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="navbar-brand"><div class="logo-icon">📊</div><span>Market Databank</span></a>
    <div class="navbar-nav">
      <a href="/" class="nav-link">Home</a>
      <a href="/upload.html" id="nav-upload" class="nav-link" style="display:none">Upload</a>
      <a href="/dashboard.html" id="nav-dash" class="nav-link" style="display:none">Dashboard</a>
      <a href="/login.html" id="nav-login" class="nav-link" style="display:none">Login</a>
    </div>
    <div class="navbar-user">
      <span id="nav-username"></span>
      <button id="nav-logout" class="btn btn-secondary btn-sm" style="display:none">Logout</button>
    </div>
  </div>
</nav>

<main class="page">
  <div class="container" style="max-width: 500px; margin-top: 40px;">
    
    <div class="card" style="padding: 32px;">
      <h1 style="text-align:center; margin-bottom: 8px; font-size: 1.8rem;">Change Password</h1>
      <p style="text-align:center; color: var(--text-muted); margin-bottom: 24px;">Please enter your current password to update your security settings.</p>
      
      <form id="change-password-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="current-password">Current Password</label>
          <input class="form-control" type="password" id="current-password" placeholder="••••••••" required />
        </div>
        
        <div class="form-group">
          <label class="form-label" for="new-password">New Password</label>
          <input class="form-control" type="password" id="new-password" placeholder="Min. 6 characters" required />
        </div>
        
        <div class="form-group">
          <label class="form-label" for="confirm-new-password">Confirm New Password</label>
          <input class="form-control" type="password" id="confirm-new-password" placeholder="Min. 6 characters" required />
        </div>
        
        <p id="password-error" class="form-error" style="margin-bottom:16px; text-align: center;"></p>
        
        <button type="submit" class="btn btn-primary" id="password-submit" style="width: 100%;">Update Password</button>
        <a href="/dashboard.html" class="btn btn-secondary" style="width: 100%; text-align:center; margin-top: 12px; display:block; text-decoration:none;">Cancel</a>
      </form>
    </div>

  </div>
</main>

<script type="module" src="/js/change-password.js"></script>
</body>
</html>
